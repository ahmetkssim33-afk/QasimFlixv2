<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070B1A">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/assets/icons/icon-192.png" type="image/png">
<title>SineQ — İnternet Yok</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;background:#070B1A;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Arial;padding:24px;text-align:center;overflow:hidden}body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 30% 20%,rgba(245,185,66,.25),transparent 28%),radial-gradient(circle at 78% 72%,rgba(120,30,255,.16),transparent 26%);filter:blur(2px)}.box{position:relative;z-index:1;width:min(430px,100%);padding:30px 22px;border-radius:30px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.12);box-shadow:0 30px 80px rgba(0,0,0,.55);backdrop-filter:blur(18px)}.logo{font-size:42px;font-weight:1000;letter-spacing:-1.5px;color:#F5B942;margin-bottom:8px}.pulse{width:80px;height:80px;margin:0 auto 18px;border-radius:24px;background:linear-gradient(135deg,#F5B942,#6d0710);display:grid;place-items:center;font-size:34px;box-shadow:0 0 0 0 rgba(245,185,66,.45);animation:pulse 1.7s infinite}h1{margin:8px 0 8px;font-size:24px}p{color:rgba(255,255,255,.68);line-height:1.6;margin:0 0 22px}.actions{display:grid;gap:10px}button,a{border:0;border-radius:16px;padding:14px 16px;font-weight:900;text-decoration:none;cursor:pointer}button{background:#F5B942;color:#fff}a{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.12)}small{display:block;margin-top:18px;color:rgba(255,255,255,.42);line-height:1.45}@keyframes pulse{70%{box-shadow:0 0 0 18px rgba(245,185,66,0)}}
</style>
</head>
<body>
  <main class="box">
    <div class="pulse">📡</div>
    <div class="logo">SineQ</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Bağlantını kontrol et. Daha önce açılan sayfalar önbellekten gelebilir; MP4 indirilenler cihazının indirme klasöründe olur.</p>
    <div class="actions">
      <button onclick="location.reload()">Tekrar Dene</button>
      <a href="/index.html?action=downloads">İndirilenleri Aç</a>
    </div>
    <small>APK modu için çevrimdışı ekran hazır. Google Drive/iframe videolar çevrimdışı indirilemez.</small>
  </main>
</body>
</html>
