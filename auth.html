<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamBase — Giriş & Kayıt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --accent-glow: rgba(108,99,255,0.25);
      --text: #e8e8f0;
      --muted: #8888a0;
      --error: #ff4d6d;
      --success: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Arka plan blur efekti */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(99,200,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .page {
      width: 100%;
      max-width: 460px;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
      padding-bottom: 120px;
    }

    /* Tab geçişi */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* Input */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 17px;
      height: 17px;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input.error { border-color: var(--error); }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
    }

    /* Şifre gücü */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      height: 3px;
    }

    .strength-bar span {
      flex: 1;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .strength-bar.s1 span:nth-child(1) { background: var(--error); }
    .strength-bar.s2 span:nth-child(-n+2) { background: #f59e0b; }
    .strength-bar.s3 span:nth-child(-n+3) { background: #3b82f6; }
    .strength-bar.s4 span { background: var(--success); }

    .strength-label {
      font-size: 0.75rem;
      margin-top: 4px;
      color: var(--muted);
    }

    /* Checkbox */
    .checkbox-field {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-field input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox-field label {
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1.4;
    }

    .checkbox-field a { color: var(--accent); text-decoration: none; }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover { opacity: 0.92; box-shadow: 0 6px 24px var(--accent-glow); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sticky/call-to-action for register form: center at bottom of card */
    #registerBtn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18px;
      width: min(420px, calc(100% - 48px));
      z-index: 6;
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    /* Alert */
    .alert {
      padding: 12px 14px;
      border-radius: 9px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }

    .alert.show { display: flex; }
    .alert.error { background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3); color: #ff8fa3; }
    .alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: #86efac; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Sosyal */
    .social-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .social-btn:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.07);
    }

    /* Şifremi unuttum */
    .forgot-link {
      text-align: right;
      margin-bottom: 16px;
    }

    .forgot-link a {
      color: var(--accent);
      font-size: 0.82rem;
      text-decoration: none;
    }

    /* Success state */
    .success-state {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .success-state.show { display: block; }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 2rem;
    }

    .success-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .success-state p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px 160px; border-radius: 16px; }
      #registerBtn { bottom: 12px; width: calc(100% - 40px); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <h1>StreamBase</h1>
      <p>Sınırsız film ve dizi deneyimi</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button type="button" class="tab-btn active" data-tab="login">Giriş Yap</button>
        <button type="button" class="tab-btn" data-tab="register">Kayıt Ol</button>
      </div>

      <!-- ── GİRİŞ FORMU ─────────────────────────────── -->
      <div id="panel-login" class="form-panel active">
        <div id="login-alert" class="alert"></div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label>E-posta</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input type="email" id="loginEmail" placeholder="ornek@email.com" required autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label>Şifre</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input type="password" id="loginPassword" placeholder="Şifreniz" required autocomplete="current-password" />
              <button type="button" class="toggle-pass" onclick="togglePass('loginPassword', this)">
                <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="forgot-link">
            <a href="#" onclick="showForgotPanel(); return false;">Şifremi unuttum?</a>
          </div>

          <button type="submit" class="btn-submit" id="loginBtn">
            <span class="btn-text">Giriş Yap</span>
            <div class="spinner"></div>
          </button>
        </form>

        <div class="divider">veya</div>

        <button class="social-btn" onclick="alert('Yakında!')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
          Google ile devam et
        </button>
      </div>

      <!-- ── KAYIT FORMU ──────────────────────────────── -->
      <div id="panel-register" class="form-panel">
        <div id="register-alert" class="alert"></div>

        <div id="registerSuccess" class="success-state">
          <div class="success-icon">🎉</div>
          <h3>Hesabın oluşturuldu!</h3>
          <p>Başarıyla kayıt oldun. Giriş yapabilirsin.</p>
          <br>
          <button type="button" class="btn-submit" onclick="switchTab('login')" style="max-width:200px;margin:0 auto;">
            <span class="btn-text">Giriş Yap</span>
          </button>
        </div>

        <form id="registerForm" novalidate>
          <div class="field">
            <label>Kullanıcı Adı</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input type="text" id="regUsername" placeholder="kullanici_adi" required minlength="3" />
            </div>
          </div>

          <div class="field">
            <label>E-posta</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input type="email" id="regEmail" placeholder="ornek@email.com" required />
            </div>
          </div>

          <div class="field">
            <label>Şifre</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input type="password" id="regPassword" placeholder="En az 6 karakter" required oninput="updateStrength(this.value)" />
              <button type="button" class="toggle-pass" onclick="togglePass('regPassword', this)">
                <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <div class="strength-bar" id="strengthBar">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <div class="field">
            <label>Şifre Tekrar</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
              <input type="password" id="regPasswordConfirm" placeholder="Şifreyi tekrar girin" required />
            </div>
          </div>

          <div class="checkbox-field">
            <input type="checkbox" id="terms" required />
            <label for="terms">
              <a href="#">Kullanım koşullarını</a> ve <a href="#">gizlilik politikasını</a> okudum, kabul ediyorum.
            </label>
          </div>

          <button type="submit" class="btn-submit" id="registerBtn">
            <span class="btn-text">Hesap Oluştur</span>
            <div class="spinner"></div>
          </button>
        </form>
      </div>

      <!-- ── ŞİFRE SIFIRLA ───────────────────────────── -->
      <div id="panel-forgot" class="form-panel">
        <p style="color:var(--muted);font-size:.88rem;margin-bottom:20px;line-height:1.6;">
          Kayıtlı e-posta adresinizi girin, şifre sıfırlama bağlantısını göndereceğiz.
        </p>
        <div id="forgot-alert" class="alert"></div>
        <form id="forgotForm" novalidate>
          <div class="field">
            <label>E-posta</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input type="email" id="forgotEmail" placeholder="ornek@email.com" required />
            </div>
          </div>
          <button type="submit" class="btn-submit" id="forgotBtn">
            <span class="btn-text">Sıfırlama Bağlantısı Gönder</span>
            <div class="spinner"></div>
          </button>
        </form>
        <div style="text-align:center;margin-top:16px">
          <a href="#" style="color:var(--accent);font-size:.85rem" onclick="switchTab('login');return false;">← Giriş sayfasına dön</a>
        </div>
      </div>

        <!-- ── RESET PASSWORD PANEL (Shown via resetToken URL param) ───────────────── -->
        <div id="panel-reset" class="form-panel">
          <div id="reset-alert" class="alert"></div>
          <form id="resetForm" novalidate>
            <input type="hidden" id="resetToken" />
            <div class="field">
              <label>Yeni Şifre</label>
              <div class="input-wrap">
                <input type="password" id="resetPassword" placeholder="Yeni şifre" required />
              </div>
            </div>
            <div class="field">
              <label>Şifre Tekrar</label>
              <div class="input-wrap">
                <input type="password" id="resetPasswordConfirm" placeholder="Şifreyi tekrar girin" required />
              </div>
            </div>
            <button type="submit" class="btn-submit" id="resetBtn">
              <span class="btn-text">Şifreyi Yenile</span>
              <div class="spinner"></div>
            </button>
          </form>
        </div>

      </div><!-- /card -->
  </div><!-- /page -->

  <script>
    const API = '/api';

    // ─── Tab sistemi ─────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById('panel-' + name);
      if (panel) panel.classList.add('active');
    }

    function showForgotPanel() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-forgot').classList.add('active');
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ─── Şifre göster/gizle ──────────────────────────────────────────────────
    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('svg path:first-child').setAttribute('d',
        isText
          ? 'M15 12a3 3 0 11-6 0 3 3 0 016 0z'
          : 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21'
      );
    }

    // ─── Şifre gücü ──────────────────────────────────────────────────────────
    function updateStrength(val) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const labels = ['', 'Zayıf', 'Orta', 'İyi', 'Güçlü'];
      bar.className = 'strength-bar' + (val.length ? ' s' + score : '');
      label.textContent = val.length ? labels[score] : '';
    }

    // ─── Alert ───────────────────────────────────────────────────────────────
    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    // ─── Giriş ───────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      setLoading('loginBtn', true);
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const ct = (res.headers.get('content-type') || '');
        let data;
        if (ct.includes('application/json')) {
          data = await res.json();
        } else {
          const text = await res.text();
          throw new Error('Sunucudan JSON gelmedi: ' + (text && text.substr ? text.substr(0, 300) : String(text)));
        }
        if (!res.ok) throw new Error(data.message || data.error || 'Sunucu hatası');
        localStorage.setItem('token', data.token);
        showAlert('login-alert', 'Giriş başarılı! Yönlendiriliyorsunuz...', 'success');
        setTimeout(() => window.location.href = '/index.html', 1200);
      } catch (err) {
        showAlert('login-alert', err.message, 'error');
      } finally {
        setLoading('loginBtn', false);
      }
    });

    // ─── Kayıt ───────────────────────────────────────────────────────────────
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      const terms = document.getElementById('terms').checked;

      if (!terms) return showAlert('register-alert', 'Kullanım koşullarını kabul etmelisiniz', 'error');
      if (password !== passwordConfirm) return showAlert('register-alert', 'Şifreler eşleşmiyor', 'error');

      setLoading('registerBtn', true);
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, passwordConfirm }),
        });
        const ct = (res.headers.get('content-type') || '');
        let data;
        if (ct.includes('application/json')) {
          data = await res.json();
        } else {
          const text = await res.text();
          throw new Error('Sunucudan JSON gelmedi: ' + (text && text.substr ? text.substr(0, 300) : String(text)));
        }
        if (!res.ok) throw new Error(data.message || data.error || 'Sunucu hatası');
        localStorage.setItem('token', data.token);
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('registerSuccess').classList.add('show');
      } catch (err) {
        showAlert('register-alert', err.message, 'error');
      } finally {
        setLoading('registerBtn', false);
      }
    });

    // ─── Şifremi unuttum ─────────────────────────────────────────────────────
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      setLoading('forgotBtn', true);
      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        showAlert('forgot-alert', data.message, res.ok ? 'success' : 'error');
      } catch {
        showAlert('forgot-alert', 'Bağlantı hatası', 'error');
      } finally {
        setLoading('forgotBtn', false);
      }
    });

    // ─── Reset form handling & auto-open when resetToken in URL ─────────────
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('resetToken').value;
      const password = document.getElementById('resetPassword').value;
      const passwordConfirm = document.getElementById('resetPasswordConfirm').value;
      setLoading('resetBtn', true);
      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, passwordConfirm })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || data.error || 'Hata');
        showAlert('reset-alert', data.message || 'Şifre yenilendi', 'success');
        setTimeout(() => window.location.href = '/auth', 1400);
      } catch (err) {
        showAlert('reset-alert', err.message, 'error');
      } finally { setLoading('resetBtn', false); }
    });

    // Auto-open reset panel when resetToken query param present
    (function() {
      try {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('resetToken');
        if (token) {
          document.getElementById('resetToken').value = token;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
          document.getElementById('panel-reset').classList.add('active');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</body>
</html>
